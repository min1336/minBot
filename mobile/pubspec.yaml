name: minbot_app
description: minBot - 소형 애완 로봇 컨트롤러
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.0
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  permission_handler: ^11.3.0
  record: ^5.1.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
